name: Deploy to InfinityFree

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: Create production config files
        run: |
          cat > config/db.local.php << EOF
          <?php
          \$DB_HOST = '${{ secrets.DB_HOST }}';
          \$DB_NAME = '${{ secrets.DB_NAME }}';
          \$DB_USER = '${{ secrets.DB_USER }}';
          \$DB_PASS = '${{ secrets.DB_PASS }}';
          EOF
          cat > config/mail.local.php << EOF
          <?php
          \$MAIL_USERNAME = '${{ secrets.MAIL_USERNAME }}';
          \$MAIL_PASSWORD = '${{ secrets.MAIL_PASSWORD }}';
          \$MAIL_FROM     = '${{ secrets.MAIL_FROM }}';
          EOF

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via FTP
        run: lftp -c "open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftpupload.net; set ftp:ssl-allow no; set ftp:chmod no; mirror -R --verbose=2 --exclude-glob .git/ --exclude-glob .gitignore --exclude-glob .github/ --exclude-glob .gitattributes --exclude-glob README.md ./ /htdocs/; quit"
